services:
  llama-router:
    build: .
    ports:
      - "80:80"
      - "8080:8080"
      - "9200:9200"
      - "11434:11434"
    volumes:
      - llama-router-data:/app/data
    environment:
      LLAMA_ROUTER_DATABASE_PATH: /app/data/llama_router.db
      LLAMA_ROUTER_CACHE_DIR: /app/data/model_cache
      # Set this to the IP/hostname your Ollama backends can reach this host on
      # LLAMA_ROUTER_CACHE_EXTERNAL_HOST: 192.168.1.50
    restart: unless-stopped

volumes:
  llama-router-data:
