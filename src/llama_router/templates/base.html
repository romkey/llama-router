<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}llama-router{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .status-idle { color: #198754; }
        .status-busy { color: #ffc107; }
        .status-offline { color: #dc3545; }
        .status-unknown { color: #6c757d; }
        .provider-card { transition: transform 0.15s ease-in-out; }
        .provider-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-diagram-3-fill me-2"></i>llama-router
            </a>
        </div>
    </nav>
    <div class="container mt-3">
        <ul class="nav nav-tabs mb-4" id="main-nav-tabs" role="tablist">
            {% block nav_tabs %}
            <li class="nav-item"><a class="nav-link" href="/#providers-pane"><i class="bi bi-hdd-stack me-1"></i>Providers</a></li>
            <li class="nav-item"><a class="nav-link" href="/#benchmarks-pane"><i class="bi bi-speedometer me-1"></i>Benchmarks</a></li>
            <li class="nav-item"><a class="nav-link" href="/#models-pane"><i class="bi bi-cpu me-1"></i>Models</a></li>
            <li class="nav-item"><a class="nav-link" href="/#log-pane"><i class="bi bi-journal-text me-1"></i>Log</a></li>
            <li class="nav-item"><a class="nav-link" href="/#cache-pane"><i class="bi bi-archive me-1"></i>Cache</a></li>
            {% endblock %}
        </ul>
        {% block content %}{% endblock %}
    </div>
    <footer class="container text-center text-muted py-4 mt-5 border-top">
        <a href="https://github.com/romkey/llama-router" target="_blank" rel="noopener" class="text-muted text-decoration-none">
            <i class="bi bi-github me-1"></i>romkey/llama-router
        </a>
        <span class="mx-2">&middot;</span>
        v{{ version }}
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
